<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Codex × Higgsfield MCP 実ワークフロー</title>
  <desc id="desc">短尺CM制作を入力、ブリーフ、プロンプト、MCP確認、生成、納品チェック、note下書き、人間レビューへ進める流れの図解。</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 800 48px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif; fill: #202124; }
      .subtitle { font: 500 24px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif; fill: #65676b; }
      .lane-title { font: 800 26px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif; fill: #202124; }
      .step-title { font: 800 25px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif; fill: #202124; }
      .step-copy { font: 500 19px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif; fill: #4f5357; }
      .small { font: 700 17px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif; fill: #4f5357; }
      .gate-title { font: 800 22px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif; fill: #7a3217; }
      .gate-copy { font: 600 17px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif; fill: #7a3217; }
      .note { font: 800 21px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif; fill: #0c6c51; }
    </style>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.09"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#687076"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <rect x="52" y="48" width="1496" height="904" rx="28" fill="#f7f8f6"/>

  <text x="92" y="118" class="title">Codex × Higgsfield MCP 実ワークフロー</text>
  <text x="94" y="162" class="subtitle">競馬AIの短尺CMを「企画 → 生成準備 → 生成 → 納品 → note化」まで半自動化する流れ</text>

  <rect x="94" y="216" width="1412" height="104" rx="20" fill="#ffffff" stroke="#e1e4e1"/>
  <text x="124" y="258" class="note">今回の制作方針</text>
  <text x="124" y="294" class="step-copy">縦動画はX/ショート向け。横動画はnote埋め込み、YouTube風プレビュー、LP/実績紹介向け。生成は一気に回さず、承認後に1本ずつ。</text>

  <text x="112" y="382" class="lane-title">Codexが整理する</text>
  <text x="112" y="604" class="lane-title">Higgsfield MCPで実行する</text>
  <text x="112" y="826" class="lane-title">人間が確認する</text>

  <line x1="92" y1="414" x2="1506" y2="414" stroke="#dde3df" stroke-width="2"/>
  <line x1="92" y1="636" x2="1506" y2="636" stroke="#dde3df" stroke-width="2"/>
  <line x1="92" y1="858" x2="1506" y2="858" stroke="#dde3df" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="294" y="346" width="210" height="136" rx="18" fill="#ffffff" stroke="#dce2df"/>
    <text x="324" y="390" class="step-title">1. 入力</text>
    <text x="324" y="426" class="step-copy">商品名、ターゲット、</text>
    <text x="324" y="454" class="step-copy">CTA、NG表現</text>

    <rect x="566" y="346" width="210" height="136" rx="18" fill="#ffffff" stroke="#dce2df"/>
    <text x="596" y="390" class="step-title">2. ブリーフ</text>
    <text x="596" y="426" class="step-copy">冒頭3秒、構成、</text>
    <text x="596" y="454" class="step-copy">権利確認</text>

    <rect x="838" y="346" width="210" height="136" rx="18" fill="#ffffff" stroke="#dce2df"/>
    <text x="868" y="390" class="step-title">3. 参照画像</text>
    <text x="868" y="426" class="step-copy">権利不明素材なしの</text>
    <text x="868" y="454" class="step-copy">抽象ビジュアル</text>

    <rect x="1110" y="346" width="210" height="136" rx="18" fill="#ffffff" stroke="#dce2df"/>
    <text x="1140" y="390" class="step-title">4. Prompt</text>
    <text x="1140" y="426" class="step-copy">9:16と16:9を</text>
    <text x="1140" y="454" class="step-copy">別々に設計</text>
  </g>

  <line x1="504" y1="414" x2="558" y2="414" stroke="#687076" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="776" y1="414" x2="830" y2="414" stroke="#687076" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1048" y1="414" x2="1102" y2="414" stroke="#687076" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="294" y="568" width="210" height="136" rx="18" fill="#ffffff" stroke="#dce2df"/>
    <text x="324" y="612" class="step-title">5. 状態確認</text>
    <text x="324" y="648" class="step-copy">ログイン、課金、</text>
    <text x="324" y="676" class="step-copy">モデル利用可否</text>

    <rect x="566" y="568" width="210" height="136" rx="18" fill="#ffffff" stroke="#dce2df"/>
    <text x="596" y="612" class="step-title">6. 見積もり</text>
    <text x="596" y="648" class="step-copy">クレジット消費と</text>
    <text x="596" y="676" class="step-copy">生成条件を記録</text>

    <rect x="838" y="568" width="210" height="136" rx="18" fill="#ffffff" stroke="#dce2df"/>
    <text x="868" y="612" class="step-title">7. 生成</text>
    <text x="868" y="648" class="step-copy">まず縦1本。</text>
    <text x="868" y="676" class="step-copy">承認後に横1本</text>

    <rect x="1110" y="568" width="210" height="136" rx="18" fill="#ffffff" stroke="#dce2df"/>
    <text x="1140" y="612" class="step-title">8. 保存</text>
    <text x="1140" y="648" class="step-copy">job JSON、URL、</text>
    <text x="1140" y="676" class="step-copy">MP4、ログ</text>
  </g>

  <line x1="504" y1="636" x2="558" y2="636" stroke="#687076" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="776" y1="636" x2="830" y2="636" stroke="#687076" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1048" y1="636" x2="1102" y2="636" stroke="#687076" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="294" y="790" width="210" height="136" rx="18" fill="#ffffff" stroke="#dce2df"/>
    <text x="324" y="834" class="step-title">9. 納品確認</text>
    <text x="324" y="870" class="step-copy">比率、尺、表記、</text>
    <text x="324" y="898" class="step-copy">誇大表現を確認</text>

    <rect x="566" y="790" width="210" height="136" rx="18" fill="#ffffff" stroke="#dce2df"/>
    <text x="596" y="834" class="step-title">10. note化</text>
    <text x="596" y="870" class="step-copy">導入、構成、</text>
    <text x="596" y="898" class="step-copy">有料テンプレ</text>

    <rect x="838" y="790" width="210" height="136" rx="18" fill="#ffffff" stroke="#dce2df"/>
    <text x="868" y="834" class="step-title">11. 最終判断</text>
    <text x="868" y="870" class="step-copy">公開、価格、権利、</text>
    <text x="868" y="898" class="step-copy">表現を人間確認</text>

    <rect x="1110" y="790" width="210" height="136" rx="18" fill="#ffffff" stroke="#dce2df"/>
    <text x="1140" y="834" class="step-title">12. 公開</text>
    <text x="1140" y="870" class="step-copy">自動では押さない。</text>
    <text x="1140" y="898" class="step-copy">人間が公開</text>
  </g>

  <line x1="504" y1="858" x2="558" y2="858" stroke="#687076" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="776" y1="858" x2="830" y2="858" stroke="#687076" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1048" y1="858" x2="1102" y2="858" stroke="#687076" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M1215 482 C1215 528 399 520 399 562" fill="none" stroke="#687076" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <path d="M1215 704 C1215 750 399 744 399 784" fill="none" stroke="#687076" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="1348" y="346" width="128" height="580" rx="20" fill="#fff4eb" stroke="#f0c9af"/>
    <text x="1374" y="394" class="gate-title">停止</text>
    <text x="1374" y="426" class="gate-title">ゲート</text>
    <text x="1374" y="480" class="gate-copy">未承認</text>
    <text x="1374" y="512" class="gate-copy">未ログイン</text>
    <text x="1374" y="544" class="gate-copy">未課金</text>
    <text x="1374" y="576" class="gate-copy">残高不明</text>
    <text x="1374" y="608" class="gate-copy">権利不明</text>
    <text x="1374" y="640" class="gate-copy">誇大表現</text>
    <text x="1374" y="704" class="small">該当時は</text>
    <text x="1374" y="734" class="small">生成せず</text>
    <text x="1374" y="764" class="small">人間へ戻す</text>
  </g>
</svg>
